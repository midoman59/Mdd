spring:
  application:
    name: mdd-api
  datasource:
    url: jdbc:mysql://localhost:3306/mdd
    username: ${USERNAME_MYSQL}
    password: ${PASSWORD_MYSQL}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 3001

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 3600000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs
