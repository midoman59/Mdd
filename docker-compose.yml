version: '3.8'

services:
  mysql:
    image: mysql:8.0.33
    container_name: mdd-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: mdd
      MYSQL_USER: mdd_user
      MYSQL_PASSWORD: mdd_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

volumes:
  mysql_data:
